<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markets — Prediction Markets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="app-page">

  <!-- ── NAV ── -->
  <nav class="app-nav">
    <div class="nav-left">
      <a href="/pages/markets.html" class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Prediction Markets</span>
      </a>
    </div>
    <div class="nav-right">
      <span class="nav-username" id="navUsername"></span>
      <a href="/pages/markets.html" class="nav-link active">Markets</a>
      <!-- Admin link shown only for admins -->
      <a href="/pages/admin.html" class="nav-link admin-only hidden" id="adminLink">Admin</a>
      <button class="btn-outline small" onclick="logout()">Log Out</button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="app-main">

    <!-- Page title + submit button -->
    <div class="page-header">
      <div>
        <h2 class="page-title">Live Markets</h2>
        <p class="page-subtitle">Vote on outcomes. See the crowd's prediction in real time.</p>
      </div>
      <button class="btn-primary" onclick="openSubmitModal()">+ Submit Event</button>
    </div>

    <!-- Events grid -->
    <div class="events-grid" id="eventsGrid">
      <!-- Cards injected by JS -->
      <div class="loading-state" id="loadingState">
        <div class="spinner">◈</div>
        <p>Loading markets…</p>
      </div>
    </div>

    <!-- Empty state (shown when no events) -->
    <div class="empty-state hidden" id="emptyState">
      <p class="empty-icon">◎</p>
      <p>No open markets yet.</p>
      <p class="empty-sub">Be the first to submit an event for approval.</p>
    </div>

  </main>

  <!-- ── SUBMIT EVENT MODAL ── -->
  <div class="modal-overlay hidden" id="submitModal" onclick="closeSubmitModal(event)">
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeSubmitModal()">✕</button>
      <h3>Submit an Event</h3>
      <p class="modal-sub">Your event will be reviewed by an admin before it goes live.</p>
      <form onsubmit="handleSubmitEvent(event)">
        <div class="field">
          <label for="eventTitle">Event title</label>
          <input type="text" id="eventTitle" placeholder='e.g. "Will Bitcoin reach $100k by end of 2025?"' required />
        </div>
        <div class="form-error" id="submitError"></div>
        <button type="submit" class="btn-primary full-width" id="submitBtn">
          <span class="btn-label">Submit for Review</span>
          <span class="btn-spinner hidden">↻</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/markets.js"></script>
</body>
</html>
