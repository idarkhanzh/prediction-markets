<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Prediction Markets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="admin-page">

<nav class="navbar">
  <a href="../index.html" class="nav-brand">
    <span class="brand-icon">◈</span>
    Prediction Markets
  </a>
  <div class="nav-links">
    <a href="../index.html" class="nav-link">Markets</a>
    <a href="admin.html" class="nav-link active">Admin</a>
    <button class="btn-ghost small" id="logoutBtn">Log out</button>
  </div>
</nav>

<div class="admin-container">

  <div class="admin-header">
    <h1>Admin Panel</h1>
    <p class="admin-sub">Logged in as <strong id="adminUsername">—</strong></p>
  </div>

  <!-- Create event directly -->
  <div class="admin-card">
    <h2 class="card-title"><span class="icon">+</span> Create Event Directly</h2>
    <p class="form-hint">Events you create here are immediately approved and go live.</p>
    <div class="input-row">
      <input type="text" id="adminEventTitle" class="input" placeholder="Event title…" maxlength="120" />
      <button class="btn-primary" id="adminCreateBtn">Create</button>
    </div>
    <p class="form-msg" id="createMsg"></p>
  </div>

  <!-- Pending events queue -->
  <div class="admin-card">
    <h2 class="card-title"><span class="icon pending-dot">●</span> Pending Approval</h2>
    <div id="pendingList">
      <div class="loading-state"><div class="spinner"></div><p>Loading…</p></div>
    </div>
  </div>

  <!-- All approved events with delete -->
  <div class="admin-card">
    <h2 class="card-title"><span class="icon ok-dot">●</span> Live Events</h2>
    <div id="approvedList">
      <div class="loading-state"><div class="spinner"></div><p>Loading…</p></div>
    </div>
  </div>

</div>

<footer class="footer">
  <span class="footer-brand">◈ Prediction Markets</span>
  <span class="footer-note">Admin view</span>
</footer>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
